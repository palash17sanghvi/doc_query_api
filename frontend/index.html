<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocQuery | Secure Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-black mb-4 border-bottom border-secondary">
        <div class="container">
            <span class="navbar-brand mb-0 h1 tracking-wide">DOC<span class="text-primary">QUERY</span></span>
            <div id="user-controls" class="d-none">
                <span class="text-light me-3">Welcome, <strong id="display-username"
                        class="text-primary"></strong></span>
                <button id="btn-logout" class="btn btn-sm btn-outline-light">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="alert-box" class="alert d-none shadow-lg" role="alert"></div>

        <div id="view-auth" class="row justify-content-center fade-in">
            <div class="col-md-5 mb-4">
                <div class="card glass-card">
                    <div class="card-body p-4">
                        <h4 class="mb-4 font-weight-light">Sign In</h4>
                        <form id="form-login">
                            <div class="mb-3">
                                <input type="text" id="login-username" class="form-control custom-input"
                                    placeholder="Username" required>
                            </div>
                            <div class="mb-4">
                                <input type="password" id="login-password" class="form-control custom-input"
                                    placeholder="Password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Access Vault</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card glass-card border-secondary">
                    <div class="card-body p-4">
                        <h4 class="mb-4 font-weight-light text-secondary">New User? Register</h4>
                        <form id="form-register">
                            <div class="mb-3">
                                <input type="text" id="reg-username" class="form-control custom-input"
                                    placeholder="Choose Username" required>
                            </div>
                            <div class="mb-4">
                                <input type="password" id="reg-password" class="form-control custom-input"
                                    placeholder="Choose Password" required>
                            </div>
                            <button type="submit" class="btn btn-outline-secondary w-100 py-2">Create Account</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-dashboard" class="d-none fade-in">
            <div class="row">

                <div class="col-md-4 mb-4">
                    <div class="card glass-card mb-4 border-primary">
                        <div class="card-body p-4">
                            <h5 id="editor-title" class="mb-3">New Document</h5>
                            <form id="form-doc">
                                <input type="hidden" id="doc-id">
                                <div class="mb-3">
                                    <input type="text" id="doc-title" class="form-control custom-input"
                                        placeholder="Document Title" required>
                                </div>
                                <div class="mb-3">
                                    <textarea id="doc-content" class="form-control custom-input" rows="5"
                                        placeholder="Document Content..." required></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Save Document</button>
                                <button type="button" id="btn-cancel-edit"
                                    class="btn btn-outline-secondary w-100 mt-2 d-none">Cancel Edit</button>
                            </form>
                        </div>
                    </div>

                    <div class="card glass-card border-danger">
                        <div class="card-body p-4">
                            <h5 class="mb-3 text-secondary">Profile Settings</h5>
                            <div class="input-group mb-3">
                                <input type="text" id="update-username-input" class="form-control custom-input"
                                    placeholder="New Username">
                                <button id="btn-update-user" class="btn btn-outline-light">Update</button>
                            </div>
                            <button id="btn-delete-user" class="btn btn-outline-danger w-100 mt-2">Delete Account
                                Permanently</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="font-weight-light">Your Vault</h4>
                    </div>
                    <div id="document-list" class="row g-3">
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
