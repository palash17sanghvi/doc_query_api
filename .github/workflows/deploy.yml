name: Continuous Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  # --- THE GATEKEEPER ---
  test-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Sanity Check
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          python manage.py check

  # --- THE DEPLOYMENT ---
  deploy-to-production:
    needs: test-code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "--- STARTING DEPLOYMENT ---"
            
            # 1. Navigate to your project folder
            cd doc_query_api
            
            # 2. Pull the newest code from GitHub
            git pull origin main
            
            # 3. Rebuild and restart the Docker containers
            docker compose up -d --build
            
            # 4. Collect static files for Django
            docker compose exec -T web python manage.py collectstatic --noinput
            
            # 5. Reload the web server to catch the changes
            sudo systemctl reload nginx
            
            echo "--- DEPLOYMENT COMPLETE ---"
